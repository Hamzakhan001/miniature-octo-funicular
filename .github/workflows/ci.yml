name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark-and-test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
        continue-on-error: true

      - name: Run benchmark
        run: uv run python scripts/run_ragas_benchmark.py
